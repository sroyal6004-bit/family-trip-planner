function boLaunch() { boBall.launched = true; const a = -Math.PI/2 + (Math.random()*0.6 - 0.3); boBall.vx = Math.cos(a)*boBall.speed; boBall.vy = Math.sin(a)*boBall.speed; }
function updateBoHud() {
  $('gameTitle').textContent = '🧱 벽돌깨기';
  $('gameScore').textContent = `Stage ${boStage} · ${gScore}점`;
  $('gameLives').textContent = boLives > 0 ? '❤️'.repeat(boLives) : '—';
}
function stepBreakout() {
  if (boMoveDir) boPaddle.x = Math.max(boPaddle.w / 2, Math.min(gW - boPaddle.w / 2, boPaddle.x + boMoveDir * Math.max(6, gW / 48)));
  if (!boBall.launched) boLaunch();
  const b = boBall, p = boPaddle;
  b.x += b.vx; b.y += b.vy;
  if (b.x - b.r < 0) { b.x = b.r; b.vx *= -1; }
  if (b.x + b.r > gW) { b.x = gW - b.r; b.vx *= -1; }
  if (b.y - b.r < boTop) { b.y = boTop + b.r; b.vy *= -1; }
  if (b.vy > 0 && b.y + b.r >= p.y && b.y - b.r <= p.y + p.h && b.x >= p.x - p.w/2 && b.x <= p.x + p.w/2) {
    b.y = p.y - b.r; const hit = (b.x - p.x)/(p.w/2); const a = -Math.PI/2 + hit*(Math.PI/3);
    b.vx = Math.cos(a)*b.speed; b.vy = Math.sin(a)*b.speed; SFX.paddle();
  }
  for (const br of boBricks) {
    if (!br.alive) continue;
    if (b.x + b.r > br.x && b.x - b.r < br.x + br.w && b.y + b.r > br.y && b.y - b.r < br.y + br.h) {
      br.alive = false; gScore += 10; updateBoHud(); SFX.brick(); spawnParticles(br.x + br.w / 2, br.y + br.h / 2, br.color);
      const ox = Math.min(b.x + b.r - br.x, br.x + br.w - (b.x - b.r));
      const oy = Math.min(b.y + b.r - br.y, br.y + br.h - (b.y - b.r));
      if (ox < oy) b.vx *= -1; else b.vy *= -1; break;
    }
  }
  for (const pt of boParticles) { pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.12; pt.life -= 0.035; }
  if (boParticles.length) boParticles = boParticles.filter(pt => pt.life > 0);
  if (b.y - b.r > boBottom) { boLives--; updateBoHud(); if (boLives <= 0) { endGame(false); return; } SFX.life(); boResetBall(); }
  if (boBricks.every(br => !br.alive)) {
    if (boStage >= BO_STAGES.length) { endGame(true); return; }
    boStage++; gScore += 50; updateBoHud(); SFX.stage(); loadBoStage(boStage);
  }
}
function boRR(x, y, w, h, r) { gctx.beginPath(); gctx.moveTo(x+r,y); gctx.arcTo(x+w,y,x+w,y+h,r); gctx.arcTo(x+w,y+h,x,y+h,r); gctx.arcTo(x,y+h,x,y,r); gctx.arcTo(x,y,x+w,y,r); gctx.closePath(); }
function drawBreakout() {
  gctx.clearRect(0,0,gW,gH); gctx.fillStyle = '#0a0d12'; gctx.fillRect(0,0,gW,gH);
  gctx.fillStyle = '#0c1017'; gctx.fillRect(0, boTop, gW, boBottom - boTop);
  gctx.strokeStyle = '#1a2432'; gctx.lineWidth = 2;
  gctx.beginPath(); gctx.moveTo(0, boBottom); gctx.lineTo(gW, boBottom); gctx.stroke();
  for (const br of boBricks) { if (!br.alive) continue; gctx.fillStyle = br.color; boRR(br.x,br.y,br.w,br.h,4); gctx.fill(); }
  gctx.fillStyle = '#4cc3e8'; boRR(boPaddle.x - boPaddle.w/2, boPaddle.y, boPaddle.w, boPaddle.h, 6); gctx.fill();
  gctx.fillStyle = '#eaf0f4'; gctx.beginPath(); gctx.arc(boBall.x, boBall.y, boBall.r, 0, Math.PI*2); gctx.fill();
  for (const pt of boParticles) { gctx.globalAlpha = Math.max(0, pt.life); gctx.fillStyle = pt.color; gctx.fillRect(pt.x - 2, pt.y - 2, 4, 4); }
  gctx.globalAlpha = 1;
}
function gamePointer(e) {
  if (gameMode !== 'breakout' || !boPaddle || !gRunning) return;
  const rect = gc.getBoundingClientRect();
  const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  boPaddle.x = Math.max(boPaddle.w/2, Math.min(gW - boPaddle.w/2, cx));
  if (e.cancelable) e.preventDefault();
}
gc.addEventListener('pointermove', gamePointer);
gc.addEventListener('touchmove', gamePointer, { passive: false });
// 막대 조작 버튼 (누르고 있는 동안 이동)
$('ctlBreakout').querySelectorAll('[data-bo]').forEach(btn => {
  const dir = btn.dataset.bo === 'left' ? -1 : 1;
  const down = e => { if (gameMode === 'breakout' && gRunning) { boMoveDir = dir; if (e.cancelable) e.preventDefault(); } };
  const up = () => { boMoveDir = 0; };
  btn.addEventListener('pointerdown', down);
  btn.addEventListener('pointerup', up);
  btn.addEventListener('pointerleave', up);
  btn.addEventListener('pointercancel', up);
  btn.addEventListener('touchend', up);
});

// ── 테트리스 ──
const TET_COLS = 10, TET_ROWS = 18, TET_CTRL_H = 100;
const TETROMINOES = {
  I: { c:'#4cc3e8', m:[[1,1,1,1]] }, O: { c:'#f4a94a', m:[[1,1],[1,1]] },
  T: { c:'#9a7ae0', m:[[1,1,1],[0,1,0]] }, S: { c:'#6fc98a', m:[[0,1,1],[1,1,0]] },
  Z: { c:'#e07a8a', m:[[1,1,0],[0,1,1]] }, J: { c:'#5a8fe0', m:[[1,0,0],[1,1,1]] },
  L: { c:'#e8a24a', m:[[0,0,1],[1,1,1]] }
};
const TET_KEYS = Object.keys(TETROMINOES);
let tetBoard, tetPiece, tetLevel = 1, tetLines = 0, tetDropMs = 800, tetAcc = 0, tetCell = 20, tetX0 = 0, tetY0 = 0;
function startTetris() {
  hideGameMsg(); gameMode = 'tetris';
  fitGameCanvas();
  const availH = gH - TET_CTRL_H;
  tetCell = Math.max(10, Math.floor(Math.min(gW / TET_COLS, availH / TET_ROWS)));
  tetX0 = Math.floor((gW - tetCell * TET_COLS) / 2); tetY0 = 8;
  tetBoard = Array.from({ length: TET_ROWS }, () => Array(TET_COLS).fill(0));
  tetLevel = tetLevelSel; tetLines = 0; gScore = 0; tetAcc = 0; tetDropMs = tetDropInterval();
  setControls('tetris');
  spawnPiece(); updateTetHud();
  gRunning = true; startGameLoop();
}
function tetDropInterval() { return Math.max(90, 820 - (tetLevel - 1) * 70); }
function updateTetHud() {
  $('gameTitle').textContent = '🟦 테트리스';
  $('gameScore').textContent = `${gScore}점 · Lv ${tetLevel}`;
  $('gameLives').textContent = `${tetLines}줄`;
}
function rotCW(m) { return m[0].map((_, i) => m.map(row => row[i]).reverse()); }
function spawnPiece() {
  const k = TET_KEYS[Math.floor(Math.random() * TET_KEYS.length)];
  const t = TETROMINOES[k];
  const m = t.m.map(r => r.slice());
  tetPiece = { m, c: t.c, x: Math.floor((TET_COLS - m[0].length) / 2), y: 0 };
  if (tetCollide(m, tetPiece.x, tetPiece.y)) endGame(false);
}
function tetCollide(m, px, py) {
  for (let r = 0; r < m.length; r++) for (let c = 0; c < m[r].length; c++) {
    if (!m[r][c]) continue;
    const nx = px + c, ny = py + r;
    if (nx < 0 || nx >= TET_COLS || ny >= TET_ROWS) return true;
    if (ny >= 0 && tetBoard[ny][nx]) return true;
  }
  return false;
}
function tetLock() {
  const m = tetPiece.m;
  for (let r = 0; r < m.length; r++) for (let c = 0; c < m[r].length; c++)
    if (m[r][c]) { const ny = tetPiece.y + r, nx = tetPiece.x + c; if (ny >= 0) tetBoard[ny][nx] = tetPiece.c; }
  let cleared = 0;
  for (let r = TET_ROWS - 1; r >= 0; r--) {
    if (tetBoard[r].every(v => v)) { tetBoard.splice(r, 1); tetBoard.unshift(Array(TET_COLS).fill(0)); cleared++; r++; }
  }
  if (cleared) {
    gScore += ([0,100,300,500,800][cleared] || 800) * tetLevel;
    tetLines += cleared; tetLevel = tetLevelSel + Math.floor(tetLines / 10); tetDropMs = tetDropInterval();
    SFX.line();
  } else SFX.lock();
  updateTetHud(); spawnPiece();
}
function tetMove(dx) { if (gRunning && !tetCollide(tetPiece.m, tetPiece.x + dx, tetPiece.y)) { tetPiece.x += dx; SFX.move(); drawTetris(); } }
function tetRotate() {
  if (!gRunning) return;
  const nm = rotCW(tetPiece.m);
  for (const k of [0, -1, 1, -2, 2]) if (!tetCollide(nm, tetPiece.x + k, tetPiece.y)) { tetPiece.m = nm; tetPiece.x += k; SFX.rotate(); drawTetris(); return; }
}
function tetSoftDrop() {
  if (!gRunning) return;
  if (!tetCollide(tetPiece.m, tetPiece.x, tetPiece.y + 1)) { tetPiece.y++; gScore += 1; updateTetHud(); }
  else tetLock();
  tetAcc = 0; drawTetris();
}
function tetHardDrop() {
  if (!gRunning) return;
  let d = 0; while (!tetCollide(tetPiece.m, tetPiece.x, tetPiece.y + 1)) { tetPiece.y++; d++; }
  gScore += d * 2; updateTetHud(); tetLock(); tetAcc = 0; drawTetris();
}
function stepTetris(dt) {
  tetAcc += dt;
  if (tetAcc >= tetDropMs) {
    tetAcc = 0;
    if (!tetCollide(tetPiece.m, tetPiece.x, tetPiece.y + 1)) tetPiece.y++;
    else tetLock();
  }
}
function drawTetCell(cx, cy, color) {
  if (cy < 0) return;
  const x = tetX0 + cx * tetCell, y = tetY0 + cy * tetCell;
  gctx.fillStyle = color; gctx.fillRect(x + 1, y + 1, tetCell - 2, tetCell - 2);
}
function drawTetris() {
  gctx.clearRect(0, 0, gW, gH); gctx.fillStyle = '#0a0d12'; gctx.fillRect(0, 0, gW, gH);
  gctx.fillStyle = '#0d1219'; gctx.fillRect(tetX0, tetY0, tetCell * TET_COLS, tetCell * TET_ROWS);
  for (let r = 0; r < TET_ROWS; r++) for (let c = 0; c < TET_COLS; c++) if (tetBoard[r][c]) drawTetCell(c, r, tetBoard[r][c]);
  if (tetPiece) { const m = tetPiece.m; for (let r = 0; r < m.length; r++) for (let c = 0; c < m[r].length; c++) if (m[r][c]) drawTetCell(tetPiece.x + c, tetPiece.y + r, tetPiece.c); }
  gctx.strokeStyle = '#263547'; gctx.lineWidth = 2; gctx.strokeRect(tetX0, tetY0, tetCell * TET_COLS, tetCell * TET_ROWS);
}
$('gameControls').querySelectorAll('[data-ctl]').forEach(btn =>
  btn.addEventListener('click', () => {
    if (gameMode !== 'tetris' || !gRunning) return;
    const a = btn.dataset.ctl;
    if (a === 'left') tetMove(-1); else if (a === 'right') tetMove(1);
    else if (a === 'rotate') tetRotate(); else if (a === 'down') tetSoftDrop(); else if (a === 'drop') tetHardDrop();
  }));
document.addEventListener('keydown', e => {
  if (!$('game').classList.contains('show') || gameMode !== 'tetris' || !gRunning) return;
  if (e.key === 'ArrowLeft') { tetMove(-1); e.preventDefault(); }
  else if (e.key === 'ArrowRight') { tetMove(1); e.preventDefault(); }
  else if (e.key === 'ArrowUp') { tetRotate(); e.preventDefault(); }
  else if (e.key === 'ArrowDown') { tetSoftDrop(); e.preventDefault(); }
  else if (e.key === ' ') { tetHardDrop(); e.preventDefault(); }
});

// ═══════════════ 마작 솔리테어 ═══════════════
const MJ_LAYERS = [ { cols:6, rows:6, x0:0, y0:0 }, { cols:4, rows:4, x0:1, y0:1 }, { cols:2, rows:2, x0:2, y0:2 } ];
const MJ_FACES = ['🍎','🍊','🍋','🍇','🍓','🍑','🍒','🥝','🍅','🌽','🍔','🍕','🍩','🥑'];
let mjSlots = [], mjSel = null;
function mjActive() { return mjSlots.filter(s => !s.removed); }
function startMahjong() {
  hideGameMsg(); gameMode = 'mahjong';
  setControls(null);
  $('mahjongWrap').style.display = 'flex';
  mjSlots = []; let idc = 0;
  for (let z = 0; z < MJ_LAYERS.length; z++) {
    const L = MJ_LAYERS[z];
    for (let c = 0; c < L.cols; c++) for (let r = 0; r < L.rows; r++)
      mjSlots.push({ c: L.x0 + c, r: L.y0 + r, z, id: idc++, removed: false, face: null });
  }
  const deck = [], facesNeeded = mjSlots.length / 4;
  for (let i = 0; i < facesNeeded; i++) { const f = MJ_FACES[i % MJ_FACES.length]; deck.push(f, f, f, f); }
  for (let i = deck.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [deck[i], deck[j]] = [deck[j], deck[i]]; }
  mjSlots.forEach((s, i) => s.face = deck[i]);
  mjSel = null; gScore = 0; gRunning = true;
  renderMahjong();
}
function mjCovered(s) { return mjSlots.some(o => !o.removed && o.z === s.z + 1 && o.c === s.c && o.r === s.r); }
function mjSideOpen(s) {
  const left = mjSlots.some(o => !o.removed && o.z === s.z && o.r === s.r && o.c === s.c - 1);
  const right = mjSlots.some(o => !o.removed && o.z === s.z && o.r === s.r && o.c === s.c + 1);
  return !left || !right;
}
function mjFree(s) { return !s.removed && !mjCovered(s) && mjSideOpen(s); }
function renderMahjong() {
  const board = $('mahjongBoard');
  const bw = board.clientWidth, bh = board.clientHeight;
  const GC = 6, GR = 6;
  let cellW = Math.min((bw - 10) / GC, (bh - 10) / (GR * 1.32));
  cellW = Math.max(20, Math.floor(cellW)); const cellH = Math.floor(cellW * 1.32);
  const off = Math.round(cellW * 0.16);
  const totalW = GC * cellW + off * 2, totalH = GR * cellH + off * 2;
  const ox = Math.floor((bw - totalW) / 2) + off * 2, oy = Math.floor((bh - totalH) / 2) + off * 2;
  const fs = Math.floor(cellW * 0.5);
  let html = '';
  for (const s of mjSlots) {
    if (s.removed) continue;
    const x = ox + s.c * cellW - s.z * off, y = oy + s.r * cellH - s.z * off;
    const zi = s.z * 100 + s.r * 6 + s.c;
    const cls = 'mj-tile' + (mjFree(s) ? '' : ' dim') + (mjSel && mjSel.id === s.id ? ' sel' : '');
    html += `<div class="${cls}" data-mj="${s.id}" style="left:${x}px;top:${y}px;width:${cellW - 2}px;height:${cellH - 2}px;font-size:${fs}px;z-index:${zi}">${s.face}</div>`;
  }
  board.innerHTML = html;
  board.querySelectorAll('[data-mj]').forEach(el => el.addEventListener('click', () => mjClick(+el.dataset.mj)));
  updateMjHud();
}
function updateMjHud() {
  $('gameTitle').textContent = '🀄 마작';
  $('gameScore').textContent = `남은 ${mjActive().length}개`;
  $('gameLives').textContent = '';
}
function mjClick(id) {
  const s = mjSlots.find(x => x.id === id);
  if (!s || s.removed || !mjFree(s)) return;
  if (mjSel && mjSel.id === s.id) { mjSel = null; renderMahjong(); return; }
  if (mjSel && mjSel.face === s.face) {
    s.removed = true; mjSel.removed = true; mjSel = null; gScore += 10;
    SFX.brick(); renderMahjong();
    if (mjActive().length === 0) endGame(true);
    return;
  }
  mjSel = s; SFX.move(); renderMahjong();
}
function mjShuffle() {
  const act = mjActive(), faces = act.map(s => s.face);
  for (let i = faces.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [faces[i], faces[j]] = [faces[j], faces[i]]; }
  act.forEach((s, i) => s.face = faces[i]); mjSel = null; renderMahjong(); toast('타일을 섞었어요');
}
function mjHint() {
  const free = mjActive().filter(mjFree);
  for (let i = 0; i < free.length; i++) for (let j = i + 1; j < free.length; j++) {
    if (free[i].face === free[j].face) {
      renderMahjong();
      const els = [free[i].id, free[j].id].map(id => $('mahjongBoard').querySelector(`[data-mj="${id}"]`));
      els.forEach(e => { if (e) e.classList.add('sel'); });
      setTimeout(() => els.forEach(e => { if (e) e.classList.remove('sel'); }), 900);
      return;
    }
  }
  toast('맞출 수 있는 짝이 없어요. 섞기를 눌러보세요');
}
$('mjShuffle').addEventListener('click', mjShuffle);
$('mjHint').addEventListener('click', mjHint);

window.addEventListener('beforeinstallprompt', e => {

  ownerMode = db.trips.length > 0;
  localStorage.setItem('ftp-owner', ownerMode ? '1' : '0');
} else ownerMode = localStorage.getItem('ftp-owner') === '1';
startSync();
try { history.replaceState({ ftp: 0 }, ''); } catch (e) {}   // 홈 = 기준점
render();
autoOpenFromUrl();   // 링크에 코드가 있으면 해당 여행 자동 열기
</script>
