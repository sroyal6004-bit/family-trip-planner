<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="우리 & 여행"/>
  <meta name="theme-color" content="#4cc3e8"/>
  <title>우리 &amp; 여행</title>
  <link rel="manifest" href="./manifest.json"/>
  <link rel="icon" href="./icon-192.png"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

    :root {
      --bg: #0a0d12;
      --bg2: #0d1219;
      --bg3: #101825;
      --border: #1a2432;
      --border2: #263547;
      --accent: #4cc3e8;
      --accent2: #2a8fc4;
      --text: #eaf0f4;
      --text2: #c2ccd4;
      --muted: #6b7a88;
      --muted2: #48586a;
      --green: #6fc98a;
      --green-bg: #0a120c;
      --green-border: #17281b;
      --red: #e07a8a;
      --red-bg: #180d10;
      --red-border: #321a20;
      --mono: 'DM Mono', monospace;
      --sans: 'Noto Sans KR', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overscroll-behavior: none;
    }

    button { font-family: var(--sans); -webkit-appearance: none; }
    input, select, textarea {
      font-family: var(--sans);
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      padding: 12px 14px;
      width: 100%;
      outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent2); }
    input[type="date"], input[type="time"] { min-height: 46px; }

    #app { min-height: 100vh; max-width: 640px; margin: 0 auto; padding-bottom: env(safe-area-inset-bottom, 20px); }
    /* 넓은 화면(PC)에서는 가운데 정렬된 폰 폭 칸으로 표시 */
    @media (min-width: 672px) {
      body { background: #06080c; }
      #app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); background: var(--bg); }
      .fab { right: auto; left: 50%; margin-left: 246px; }
      #install-banner { left: 50%; right: auto; margin-left: -308px; width: 616px; }
    }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 10;
      padding: calc(env(safe-area-inset-top, 0px) + 18px) 20px 16px;
      background: linear-gradient(180deg, #0c1420 0%, rgba(10,13,18,0.95) 100%);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .header-badge {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em;
      color: var(--accent); text-transform: uppercase; margin-bottom: 4px;
    }
    .header-title { font-size: 21px; font-weight: 900; display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .credit { font-size: 10px; font-weight: 400; color: #f2c14e; letter-spacing: 0; white-space: nowrap; cursor: pointer; }
    .header-sub { font-size: 12px; color: var(--muted); margin-top: 3px; font-weight: 300; }
    .back-btn {
      background: none; border: none; color: var(--accent);
      font-size: 22px; cursor: pointer; padding: 0 8px 0 0; line-height: 1;
    }
    .cloud-tag {
      display: inline-flex; align-items: center; gap: 4px;
      font-family: var(--mono); font-size: 10px; color: var(--green);
      background: var(--green-bg); border: 1px solid var(--green-border);
      padding: 2px 7px; border-radius: 12px; margin-top: 5px;
    }

    .main { padding: 18px 16px 40px; max-width: 640px; margin: 0 auto; }

    /* ── Trip cards (home) ── */
    .trip-card {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 16px; padding: 18px; margin-bottom: 12px;
      cursor: pointer; transition: transform 0.15s;
    }
    .trip-card:active { transform: scale(0.985); }
    .trip-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .trip-name { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .trip-place { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .dday {
      font-family: var(--mono); font-size: 11px; padding: 4px 10px;
      border-radius: 20px; white-space: nowrap;
      background: var(--bg3); color: var(--muted);
    }
    .dday.soon { background: #0e2836; color: var(--accent); }
    .dday.ing { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .trip-card-meta {
      display: flex; gap: 14px; margin-top: 12px;
      font-size: 12px; color: var(--muted); flex-wrap: wrap;
    }
    .trip-card-meta b { color: var(--text2); font-weight: 500; }

    .add-btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 14px;
      font-size: 15px; font-weight: 700; color: #06121a;
      cursor: pointer; transition: transform 0.15s; margin-top: 4px;
    }
    .add-btn:active { transform: scale(0.98); }
    .add-btn.ghost {
      background: transparent; border: 1.5px dashed var(--border2);
      color: var(--muted); font-weight: 500; margin-top: 10px;
    }

    .empty {
      text-align: center; padding: 48px 20px; color: var(--muted2);
      font-size: 13px; line-height: 1.8;
    }
    .empty .big { font-size: 44px; margin-bottom: 10px; }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 4px; margin-bottom: 16px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 4px;
      position: sticky; top: calc(env(safe-area-inset-top, 0px) + 92px); z-index: 9;
    }
    .tab {
      flex: 1; padding: 10px 2px; border: none; border-radius: 9px;
      background: transparent; color: var(--muted);
      font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap;
    }
    .tab.on { background: var(--bg3); color: var(--accent); font-weight: 700; }

    /* ── 멤버 탭 ── */
    .mcard { background: var(--bg2); border: 1px solid var(--border2); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
    .mcard-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .mcard-name { font-size: 15px; font-weight: 700; }
    .mfield { margin-bottom: 10px; }
    .mfield:last-child { margin-bottom: 0; }
    .mfield label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
    .mfield-row { display: flex; gap: 10px; }
    .mfield-row .mfield { flex: 1; min-width: 0; }
    .mem-photos { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .mem-thumb { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; background: var(--bg3); border: 1px solid var(--border2); cursor: pointer; display: block; }
    .mem-addphoto {
      width: 52px; height: 52px; border-radius: 8px;
      background: var(--bg3); border: 1px dashed var(--border2);
      color: var(--muted); cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    }
    .mem-addphoto span:last-child { font-size: 9px; font-weight: 700; }
    .mem-addphoto:active { background: var(--bg2); }

    /* ── Chips ── */
    .chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip-row.scroll {
      flex-wrap: nowrap; overflow-x: auto; padding-bottom: 6px;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .chip-row.scroll::-webkit-scrollbar { display: none; }
    .chip {
      padding: 8px 14px; border-radius: 20px; white-space: nowrap;
      background: var(--bg2); border: 1px solid var(--border2);
      color: var(--muted); font-size: 13px; cursor: pointer;
    }
    .chip.on { background: #0e2836; border-color: var(--accent2); color: var(--accent); font-weight: 700; }
    .chip.fund.on { background: #1a1204; border-color: #4a3410; color: #e0b050; }
    .chip .x { margin-left: 6px; opacity: 0.6; }

    /* ── Timeline (schedule) ── */
    .day-block { margin-bottom: 22px; }
    .day-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .day-route {
      margin-left: auto;
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 11px; border-radius: 16px;
      background: #0c1a24; border: 1px solid #16344a;
      color: var(--accent); font-size: 11px; font-weight: 700;
      font-family: var(--sans); cursor: pointer;
      text-decoration: none; white-space: nowrap;
    }
    .day-route:active { background: #0e2230; }

    /* ── 동선 선택 시트 ── */
    .route-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; margin-bottom: 8px;
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 12px; cursor: pointer;
    }
    .route-row.on { border-color: var(--accent2); background: #0e2836; }
    .rcheck {
      width: 22px; height: 22px; border-radius: 6px; flex: 0 0 auto;
      border: 1.5px solid var(--border2); display: flex; align-items: center;
      justify-content: center; font-size: 13px; color: transparent;
    }
    .route-row.on .rcheck { background: var(--accent); border-color: var(--accent); color: #06121a; }
    .route-time { font-family: var(--mono); font-size: 12px; color: var(--accent); min-width: 54px; white-space: nowrap; }
    .route-name { font-size: 14px; flex: 1; min-width: 0; }
    .day-num {
      font-family: var(--mono); font-size: 12px; font-weight: 700;
      color: var(--accent); letter-spacing: 0.08em;
    }
    .day-date { font-size: 12px; color: var(--muted); }
    .tl-item {
      display: flex; gap: 12px; padding: 12px 14px; margin-bottom: 8px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; cursor: pointer; align-items: flex-start;
    }
    .tl-item:active { background: var(--bg3); }
    .tl-timecol { display: flex; flex-direction: column; min-width: 58px; }
    .tl-time {
      font-family: var(--mono); font-size: 12px; color: var(--accent);
      padding-top: 2px; white-space: nowrap;
    }
    .tl-body { flex: 1; min-width: 0; }
    .tl-title { font-size: 14px; font-weight: 500; }
    .tl-memo { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .memo-link { color: var(--accent); text-decoration: underline; }
    .memo-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .memo-link-btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 7px 11px; border-radius: 9px;
      background: #0c1a24; border: 1px solid #16344a;
      color: var(--accent); font-size: 12px; font-weight: 700; text-decoration: none;
      max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .memo-link-btn:active { background: #0e2230; }
    .tl-mapbtn {
      display: flex; align-items: center; justify-content: center;
      margin-top: 9px; width: 34px; height: 34px; border-radius: 9px;
      background: #0c1a24; border: 1px solid #16344a;
      color: var(--accent); font-size: 15px; text-decoration: none;
    }
    .tl-mapbtn:active { background: #0e2230; }
    .tl-right { display: flex; flex-direction: column; align-items: center; gap: 10px; padding-top: 2px; }
    .tl-cat { font-size: 16px; }
    .tl-photos { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 9px; align-items: center; }
    .tl-thumb {
      width: 56px; height: 56px; border-radius: 8px; object-fit: cover;
      background: var(--bg3); border: 1px solid var(--border2); cursor: pointer; display: block;
    }
    .tl-addphoto {
      width: 34px; height: 34px; border-radius: 9px;
      background: var(--bg3); border: 1px solid var(--border2);
      color: var(--muted); font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .tl-addphoto:active { background: var(--bg2); }

    /* ── Lightbox (사진 크게 보기) ── */
    #lightbox {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.94); flex-direction: column;
    }
    #lightbox.show { display: flex; }
    .lb-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: calc(env(safe-area-inset-top, 0px) + 14px) 18px 14px;
    }
    .lb-btn { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; padding: 6px 10px; line-height: 1; }
    .lb-del { color: var(--red); font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 5px; }
    .lb-img-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 0 8px calc(env(safe-area-inset-bottom, 0px) + 14px); }
    .lb-img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; }

    /* ── 미니게임 ── */
    #game { display: none; position: fixed; inset: 0; z-index: 210; background: var(--bg); flex-direction: column; }
    #game.show { display: flex; }
    .game-bar {
      display: flex; align-items: center; gap: 10px;
      padding: calc(env(safe-area-inset-top, 0px) + 12px) 16px 10px;
      border-bottom: 1px solid var(--border);
    }
    .game-stat { font-family: var(--mono); font-size: 13px; color: var(--text2); white-space: nowrap; }
    .game-close { background: none; border: none; color: var(--muted); font-size: 24px; cursor: pointer; padding: 2px 6px; line-height: 1; }
    .game-canvas-wrap { position: relative; flex: 1; overflow: hidden; }
    #gameCanvas { position: absolute; inset: 0; touch-action: none; display: block; }
    .game-overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      background: rgba(6,8,12,0.82); text-align: center; padding: 20px;
    }
    .game-msg-title { font-size: 24px; font-weight: 900; }
    .game-msg-sub { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .game-start {
      margin-top: 8px; padding: 14px 34px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #06121a; font-size: 16px; font-weight: 700; cursor: pointer; font-family: var(--sans);
    }
    .game-start:active { transform: scale(0.97); }
    .gm-tabs { display: flex; gap: 8px; }
    .gm-tab {
      padding: 10px 18px; border-radius: 10px; background: var(--bg2);
      border: 1px solid var(--border2); color: var(--muted);
      font-size: 14px; font-weight: 700; cursor: pointer; font-family: var(--sans);
    }
    .gm-tab.on { background: #0e2836; border-color: var(--accent2); color: var(--accent); }
    #gmOptions { display: flex; flex-direction: column; gap: 12px; align-items: center; }
    #gmOptions .chip-row { justify-content: center; }
    .gm-opt-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; text-align: center; }
    .game-controls {
      display: none; position: absolute; left: 0; right: 0; bottom: 0; height: 94px;
      padding: 10px 12px calc(env(safe-area-inset-bottom, 0px) + 12px);
      gap: 8px; align-items: center; justify-content: center;
      background: rgba(10,13,18,0.72); backdrop-filter: blur(4px);
    }
    .game-controls.show { display: flex; }
    .gctl {
      flex: 1; max-width: 80px; height: 56px; border-radius: 12px;
      background: var(--bg3); border: 1px solid var(--border2);
      color: var(--text); font-size: 22px; cursor: pointer;
    }
    .gctl:active { background: var(--bg2); }
    .gctl-blank { flex: 1; max-width: 80px; }
    .gctl-set { gap: 8px; width: 100%; align-items: center; justify-content: center; }
    .gctl-wide { flex: 1; max-width: 170px; }

    /* ── 마작 ── */
    #mahjongWrap { display: none; position: absolute; inset: 0; z-index: 5; flex-direction: column; background: #0a0d12; }
    #mahjongBoard { flex: 1; position: relative; overflow: hidden; }
    .mj-controls {
      display: flex; gap: 10px; align-items: center; justify-content: center;
      padding: 8px 12px calc(env(safe-area-inset-bottom, 0px) + 10px);
    }
    .mj-btn {
      flex: 1; max-width: 160px; height: 48px; border-radius: 12px;
      background: var(--bg3); border: 1px solid var(--border2);
      color: var(--text); font-size: 15px; font-weight: 700; cursor: pointer; font-family: var(--sans);
    }
    .mj-btn:active { background: var(--bg2); }
    .mj-tile {
      position: absolute; border-radius: 6px; box-sizing: border-box;
      background: linear-gradient(#fdfdf7, #e9e7db); border: 1px solid #b8b4a4;
      box-shadow: 1.5px 1.5px 0 #a8a494;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      user-select: none;
    }
    .mj-tile.dim { filter: brightness(0.6); cursor: default; }
    .mj-tile.sel { outline: 3px solid var(--accent); box-shadow: 0 0 10px var(--accent); }

    /* ── Expenses ── */
    .summary-card {
      background: linear-gradient(135deg, var(--bg3), var(--bg2));
      border: 1px solid var(--border2); border-radius: 16px;
      padding: 18px; margin-bottom: 16px;
    }
    .summary-label {
      font-family: var(--mono); font-size: 10px; color: var(--muted);
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px;
    }
    .summary-total {
      font-family: var(--mono); font-size: 30px; font-weight: 900;
      color: var(--accent); letter-spacing: -0.02em;
    }
    .summary-meta { margin-top: 4px; font-size: 12px; color: var(--muted2); }
    .fund-strip { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .fund-pill {
      flex: 1; min-width: 90px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 9px 11px;
    }
    .fund-pill .k { font-size: 10px; color: var(--muted); }
    .fund-pill .v { font-family: var(--mono); font-size: 14px; margin-top: 3px; }
    .fund-pill .v.warn { color: var(--red); }
    .fund-pill .v.ok { color: var(--green); }
    .cat-bars { margin-top: 14px; display: flex; flex-direction: column; gap: 7px; }
    .cat-bar-row { display: flex; align-items: center; gap: 8px; font-size: 11px; }
    .cat-bar-label { width: 74px; color: var(--muted); white-space: nowrap; }
    .cat-bar-track { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .cat-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 3px; }
    .cat-bar-amt { font-family: var(--mono); color: var(--text2); min-width: 70px; text-align: right; }

    .exp-date-head {
      font-family: var(--mono); font-size: 11px; color: var(--muted);
      margin: 16px 0 8px; letter-spacing: 0.05em;
    }
    .exp-item {
      display: flex; flex-direction: column;
      padding: 13px 14px; margin-bottom: 8px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; cursor: pointer;
    }
    .exp-item:active { background: var(--bg3); }
    .exp-main { display: flex; align-items: center; gap: 12px; }
    .exp-cat { font-size: 18px; }
    .exp-body { flex: 1; min-width: 0; }
    .exp-title { font-size: 14px; font-weight: 500; }
    .exp-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .exp-amt { font-family: var(--mono); font-size: 15px; color: var(--text2); white-space: nowrap; }
    .exp-addphoto {
      width: 30px; height: 30px; border-radius: 8px; flex: 0 0 auto;
      background: var(--bg3); border: 1px solid var(--border2);
      color: var(--muted); font-size: 13px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .exp-addphoto:active { background: var(--bg2); }
    .exp-photos { display: flex; gap: 6px; flex-wrap: wrap; margin: 11px 0 2px 30px; }
    .exp-thumb {
      width: 50px; height: 50px; border-radius: 7px; object-fit: cover;
      background: var(--bg3); border: 1px solid var(--border2); cursor: pointer; display: block;
    }

    /* ── Settlement ── */
    .dues-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; margin-bottom: 8px;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    }
    .dues-name { flex: 1; font-size: 14px; font-weight: 500; }
    .dues-input { width: 130px !important; text-align: right; font-family: var(--mono); padding: 9px 11px !important; }
    .treasurer-note { font-size: 11px; color: var(--muted2); line-height: 1.7; margin: 2px 4px 12px; }

    .settle-member {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 8px; gap: 10px;
    }
    .settle-name { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .settle-tag { font-family: var(--mono); font-size: 9px; color: #e0b050; background: #1a1204; border: 1px solid #4a3410; padding: 2px 6px; border-radius: 10px; }
    .settle-detail { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .settle-bal { font-family: var(--mono); font-size: 15px; font-weight: 500; text-align: right; white-space: nowrap; }
    .settle-bal.plus { color: var(--green); }
    .settle-bal.minus { color: var(--red); }
    .settle-bal small { display: block; font-size: 9px; color: var(--muted2); font-weight: 400; }
    .transfer-item {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 14px 16px; margin-bottom: 8px;
      background: #0c1a24; border: 1px solid #16344a; border-radius: 12px;
      font-size: 14px;
    }
    .transfer-amt { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--accent); white-space: nowrap; }
    .transfer-arrow { color: var(--accent2); margin: 0 6px; }

    .divider { display: flex; align-items: center; gap: 10px; margin: 24px 0 14px; }
    .divider-label {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em;
      color: var(--accent); text-transform: uppercase; white-space: nowrap;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }

    /* ── Settings ── */
    .set-btn {
      width: 100%; display: flex; justify-content: space-between; align-items: center;
      padding: 15px 16px; margin-bottom: 8px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text2); font-size: 14px;
      cursor: pointer; text-align: left;
    }
    .set-btn:active { background: var(--bg3); }
    .set-btn .arr { color: var(--muted2); }
    .set-btn.danger { color: var(--red); border-color: var(--red-border); background: var(--red-bg); }

    .code-box {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 12px; padding: 16px; margin-bottom: 10px;
    }
    .code-value {
      font-family: var(--mono); font-size: 26px; font-weight: 700;
      color: var(--accent); letter-spacing: 0.15em; text-align: center;
      margin: 6px 0 12px;
    }
    .code-hint { font-size: 11px; color: var(--muted); line-height: 1.7; }

    .member-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 14px; margin-bottom: 8px;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    }
    .member-del {
      background: none; border: none; color: var(--muted);
      font-size: 17px; cursor: pointer; padding: 4px 6px;
    }

    /* ── Bottom sheet ── */
    .overlay {
      display: none; position: fixed; inset: 0; z-index: 90;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(2px);
    }
    .overlay.show { display: block; }
    .sheet {
      display: none; position: fixed; left: 0; right: 0; bottom: 0; z-index: 100;
      background: var(--bg2); border: 1px solid var(--border2); border-bottom: none;
      border-radius: 20px 20px 0 0;
      padding: 20px 20px calc(env(safe-area-inset-bottom, 0px) + 22px);
      max-height: 88vh; overflow-y: auto;
      animation: sheetUp 0.22s ease-out;
    }
    .sheet.show { display: block; }
    @keyframes sheetUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .sheet-title { font-size: 17px; font-weight: 900; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; }
    .sheet-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px; }
    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 12px; color: var(--muted);
      margin-bottom: 6px; font-weight: 500;
    }
    .field-row { display: flex; gap: 10px; }
    .field-row .field { flex: 1; }
    .sheet-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-primary {
      flex: 1; padding: 15px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; color: #06121a; cursor: pointer;
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-danger {
      padding: 15px 18px; background: var(--red-bg);
      border: 1px solid var(--red-border); border-radius: 12px;
      font-size: 14px; color: var(--red); cursor: pointer;
    }
    .member-input-row { display: flex; gap: 8px; }
    .member-input-row input { flex: 1; }
    .member-input-row button {
      padding: 0 18px; background: var(--bg3);
      border: 1px solid var(--border2); border-radius: 10px;
      color: var(--accent); font-size: 14px; font-weight: 700; cursor: pointer;
    }

    .share-btn {
      width: 100%; padding: 14px; margin-top: 6px;
      background: var(--green-bg); border: 1px solid var(--green-border);
      border-radius: 12px; font-size: 14px; font-weight: 700;
      color: var(--green); cursor: pointer;
    }
    .share-btn:active { transform: scale(0.98); }

    .fab {
      position: fixed; right: 18px; bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
      z-index: 50; width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; color: #06121a; font-size: 26px; font-weight: 700;
      cursor: pointer; box-shadow: 0 6px 24px rgba(76,195,232,0.35);
      display: none; align-items: center; justify-content: center; line-height: 1;
    }
    .fab.show { display: flex; }
    .fab:active { transform: scale(0.94); }

    /* ── Install banner ── */
    #install-banner {
      display: none; position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
      left: 12px; right: 12px; z-index: 110;
      background: linear-gradient(135deg, #04202c, #06293a);
      border: 1px solid #0e3a50; border-radius: 14px; padding: 14px 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    #install-banner.show { display: flex; align-items: center; gap: 12px; }
    .banner-text { flex: 1; font-size: 13px; color: #7ab8d0; line-height: 1.4; }
    .banner-text strong { color: var(--accent); font-size: 14px; display: block; margin-bottom: 2px; }
    .banner-btn {
      padding: 10px 16px; background: var(--accent); border: none; border-radius: 10px;
      font-size: 13px; font-weight: 700; color: #06121a; cursor: pointer; white-space: nowrap;
    }
    .banner-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; line-height: 1; }

    .toast {
      position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom, 0px) + 90px);
      transform: translateX(-50%); z-index: 120;
      background: #182838; border: 1px solid var(--border2);
      color: var(--text2); font-size: 13px;
      padding: 11px 20px; border-radius: 24px;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
      white-space: nowrap; max-width: 90vw; text-align: center;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<div id="app">
  <div class="header" id="header"></div>
  <div class="main" id="main"></div>
</div>

<button class="fab" id="fab">＋</button>

<div class="overlay" id="overlay"></div>

<!-- 여행 만들기/수정 시트 -->
<div class="sheet" id="sheetTrip">
  <div class="sheet-title"><span id="sheetTripTitle">새 여행 만들기</span><button class="sheet-close" data-close>×</button></div>
  <div class="field">
    <label>여행 이름</label>
    <input id="tName" placeholder="예) 제주도 가족여행" maxlength="30"/>
  </div>
  <div class="field">
    <label>여행지 (선택)</label>
    <input id="tPlace" placeholder="예) 제주 서귀포" maxlength="30"/>
  </div>
  <div class="field-row">
    <div class="field"><label>시작일</label><input type="date" id="tStart"/></div>
    <div class="field"><label>종료일</label><input type="date" id="tEnd"/></div>
  </div>
  <div class="field">
    <label>함께 가는 가족</label>
    <div class="member-input-row">
      <input id="tMemberInput" placeholder="이름 입력 후 추가" maxlength="10"/>
      <button id="tMemberAdd">추가</button>
    </div>
    <div class="chip-row" id="tMemberChips" style="margin-top:10px"></div>
  </div>
  <div class="sheet-actions">
    <button class="btn-primary" id="tSave">저장</button>
  </div>
</div>

<!-- 일정 추가/수정 시트 -->
<div class="sheet" id="sheetSch">
  <div class="sheet-title"><span id="sheetSchTitle">일정 추가</span><button class="sheet-close" data-close>×</button></div>
  <div class="field">
    <label>날짜</label>
    <select id="sDate"></select>
  </div>
  <div class="field">
    <label>시간 (선택)</label>
    <div style="display:flex;gap:8px">
      <select id="sAmpm" style="flex:1.3"></select>
      <select id="sHour" style="flex:1"></select>
      <select id="sMin" style="flex:1"></select>
    </div>
  </div>
  <div class="field">
    <label>분류</label>
    <div class="chip-row" id="sCatChips"></div>
  </div>
  <div class="field">
    <label>장소</label>
    <input id="sTitle" placeholder="예) 성산일출봉 · 서귀포 흑돼지집" maxlength="60"/>
    <div style="font-size:11px;color:var(--muted2);margin-top:5px">장소 이름을 적으면 구글지도에서 바로 찾아볼 수 있어요 🗺️</div>
  </div>
  <div class="field">
    <label>메모 (선택)</label>
    <textarea id="sMemo" rows="2" placeholder="예약번호, 주소, 참고사항 등" maxlength="200"></textarea>
    <div id="sMemoLinks" class="memo-links"></div>
  </div>
  <div class="sheet-actions">
    <button class="btn-danger" id="sDelete" style="display:none">삭제</button>
    <button class="btn-primary" id="sSave">저장</button>
  </div>
</div>

<!-- 경비 추가/수정 시트 -->
<div class="sheet" id="sheetExp">
  <div class="sheet-title"><span id="sheetExpTitle">경비 추가</span><button class="sheet-close" data-close>×</button></div>
  <div class="field"><label>날짜</label><select id="eDate"></select></div>
  <div class="field">
    <label>금액</label>
    <div style="display:flex; gap:8px">
      <select id="eCurrency" style="width:128px; flex:0 0 auto"></select>
      <input type="text" inputmode="decimal" id="eAmount" placeholder="0" style="flex:1"/>
    </div>
  </div>
  <div class="field" id="eForexRow" style="display:none">
    <label>환율 · 수수료</label>
    <div style="display:flex; gap:8px; align-items:center">
      <span id="eRatePrefix" style="font-size:13px; color:var(--muted); white-space:nowrap">1 =</span>
      <input type="text" inputmode="decimal" id="eRate" placeholder="환율" style="flex:1"/>
      <span style="font-size:13px; color:var(--muted); white-space:nowrap">원</span>
    </div>
    <div class="chip-row" id="eFeeChips" style="margin-top:9px"></div>
    <div id="eConverted" style="font-size:12px; color:var(--accent); margin-top:9px; font-family:var(--mono); line-height:1.5"></div>
  </div>
  <div class="field">
    <label>분류</label>
    <div class="chip-row" id="eCatChips"></div>
  </div>
  <div class="field">
    <label>내용</label>
    <input id="eTitle" placeholder="예) 흑돼지 저녁식사" maxlength="50"/>
  </div>
  <div class="field">
    <label>결제한 사람 / 방법</label>
    <div class="chip-row" id="ePayerChips"></div>
    <div style="font-size:11px;color:var(--muted2);margin-top:6px">공동회비(공금)에서 낸 돈이면 <b>🏦 공금</b>을 선택하세요</div>
  </div>
  <div class="field">
    <label>함께 나눌 사람 <span style="color:var(--muted2)">(N분의 1 정산)</span></label>
    <div class="chip-row" id="eSplitChips"></div>
  </div>
  <div class="sheet-actions">
    <button class="btn-danger" id="eDelete" style="display:none">삭제</button>
    <button class="btn-primary" id="eSave">저장</button>
  </div>
</div>

<!-- 여행 코드로 참여 시트 -->
<div class="sheet" id="sheetJoin">
  <div class="sheet-title"><span>🔗 여행 코드로 참여</span><button class="sheet-close" data-close>×</button></div>
  <div class="field">
    <label>여행 코드 (6자리)</label>
    <input id="joinCode" placeholder="예: ABC123" maxlength="6"
           autocapitalize="characters" autocomplete="off" spellcheck="false"
           style="text-transform:uppercase;letter-spacing:0.18em;font-family:var(--mono);font-size:20px;text-align:center"/>
  </div>
  <div id="joinStatus" style="font-size:12px;line-height:1.6;min-height:16px;color:var(--muted)"></div>
  <div class="sheet-actions">
    <button class="btn-primary" id="joinGo">참여하기</button>
  </div>
</div>

<!-- 미니게임 -->
<div id="game">
  <div class="game-bar">
    <span class="game-stat" id="gameTitle" style="font-weight:700;color:var(--accent)">🎮 게임</span>
    <span class="game-stat" id="gameScore" style="margin-left:auto">점수 0</span>
    <span class="game-stat" id="gameLives">❤️❤️❤️</span>
    <button class="game-close" id="gameMute">🔊</button>
    <button class="game-close" id="gameClose">×</button>
  </div>
  <div class="game-canvas-wrap" id="gameWrap">
    <canvas id="gameCanvas"></canvas>
    <div class="game-controls" id="gameControls">
      <div class="gctl-set" id="ctlBreakout">
        <button class="gctl gctl-wide" data-bo="left">◀</button>
        <button class="gctl gctl-wide" data-bo="right">▶</button>
      </div>
      <div class="gctl-set" id="ctlTetris">
        <button class="gctl" data-ctl="rotate">⟳</button>
        <button class="gctl" data-ctl="left">◀</button>
        <button class="gctl" data-ctl="right">▶</button>
        <div class="gctl-blank"></div>
        <button class="gctl" data-ctl="drop">⏬</button>
      </div>
    </div>
    <div id="mahjongWrap">
      <div id="mahjongBoard"></div>
      <div class="mj-controls">
        <button class="mj-btn" id="mjShuffle">🔀 섞기</button>
        <button class="mj-btn" id="mjHint">💡 힌트</button>
      </div>
    </div>
    <div class="game-overlay" id="gameMsg">
      <div class="game-msg-title" id="gameMsgTitle">게임</div>
      <div class="gm-tabs">
        <button class="gm-tab on" data-gmode="breakout">🧱 벽돌</button>
        <button class="gm-tab" data-gmode="tetris">🟦 테트리스</button>
        <button class="gm-tab" data-gmode="mahjong">🀄 마작</button>
      </div>
      <div id="gmOptions"></div>
      <div class="game-msg-sub" id="gameMsgSub"></div>
      <button class="game-start" id="gameStart">시작하기</button>
    </div>
  </div>
</div>

<!-- 동선(경로) 선택 시트 -->
<div class="sheet" id="sheetRoute">
  <div class="sheet-title"><span>🧭 동선파악하기</span><button class="sheet-close" data-close>×</button></div>
  <div style="font-size:12px; color:var(--muted); line-height:1.6; margin-bottom:14px">
    경로에 넣을 장소를 골라주세요. <b>같은 도시(지역)</b>끼리 골라야 길이 그려져요.<br/>
    (비행기 타는 날은 공항을 빼면 돼요.) 선택한 <b>시간 순서</b>대로 구글지도 경로가 열립니다.
  </div>
  <div id="routeList"></div>
  <div class="sheet-actions">
    <button class="btn-primary" id="routeGo">🗺️ 지도로 경로 보기</button>
  </div>
</div>

<!-- 설치 배너 -->
<div id="install-banner">
  <div class="banner-text">
    <strong>앱으로 설치하기</strong>
    홈 화면에 추가하면 앱처럼 사용할 수 있어요
  </div>
  <button class="banner-btn" id="installBtn">설치</button>
  <button class="banner-close" id="closeBanner">×</button>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept=".json,application/json" style="display:none"/>
<input type="file" id="photoInput" accept="image/*" multiple style="display:none"/>

<!-- 사진 크게 보기 -->
<div id="lightbox">
  <div class="lb-bar">
    <button class="lb-btn lb-del" id="lbDelete">🗑 삭제</button>
    <button class="lb-btn" id="lbClose">×</button>
  </div>
  <div class="lb-img-wrap"><img class="lb-img" id="lbImg" alt=""/></div>
</div>

<!-- Firebase (실시간 공유) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="./firebase-config.js"></script>

<script>
// ═══════════════ 상태 ═══════════════
const STORE_KEY = 'family-trip-planner-v1';
let db = { trips: [] };
let view = 'home';
let currentTripId = null;
let currentTab = 'schedule';
let dayFilter = 'all';
let deferredPrompt = null;
let ownerMode = false, _creditTaps = 0, _creditTimer = null;
function creditTap() {
  _creditTaps++;
  clearTimeout(_creditTimer);
  _creditTimer = setTimeout(() => { _creditTaps = 0; }, 2000);
  if (_creditTaps >= 5) {
    _creditTaps = 0;
    ownerMode = !ownerMode;
    localStorage.setItem('ftp-owner', ownerMode ? '1' : '0');
    toast(ownerMode ? '호스트 모드 ON — 새 여행 만들기 표시' : '호스트 모드 OFF — 참여만 가능');
    render();
  }
}

// 편집 상태
let formMembers = [];
let editTripId = null;
let editSchId = null;
let editExpId = null;

// 클라우드 동기화 상태
let cloudOn = false;
let fdb = null;
const subs = {};        // trips/{code} 문서 구독
const photoSubs = {};   // trips/{code}/photos 컬렉션 구독
let applyingRemote = false;

// 사진(미디어) 상태
let tripPhotos = [];        // 현재 열려있는 여행의 사진 목록
let loadedPhotoCode = null; // tripPhotos가 어떤 여행(code) 것인지
let lbPhotoId = null;       // 라이트박스에 열린 사진 id

const FUND = 'FUND';
const PHOTO_MAX_DIM = 1280;
const PHOTO_TARGET_BYTES = 470000;   // 압축 목표(바이너리) — base64 포함 ~640KB로 Firestore 1MB 이내

const SCH_CATS = [
  ['move','🚗 이동'], ['food','🍽️ 식사'], ['tour','🏞️ 관광'],
  ['stay','🏨 숙소'], ['play','🎡 놀이'], ['etc','📌 기타']
];
const EXP_CATS = [
  ['food','🍽️ 식비'], ['stay','🏨 숙박'], ['move','⛽ 교통'],
  ['tour','🎟️ 관광'], ['shop','🛍️ 쇼핑'], ['etc','💸 기타']
];
// 통화 (경비 금액 입력용) — 원화 외 선택 시 환율×수수료로 원화 환산
const CURRENCIES = [
  { c:'KRW', label:'🇰🇷 원 (KRW)', sym:'₩' },
  { c:'JPY', label:'🇯🇵 엔 (JPY)', sym:'¥' },
  { c:'USD', label:'🇺🇸 달러 (USD)', sym:'$' },
  { c:'CNY', label:'🇨🇳 위안 (CNY)', sym:'元' },
  { c:'HKD', label:'🇭🇰 홍콩달러 (HKD)', sym:'HK$' },
  { c:'EUR', label:'🇪🇺 유로 (EUR)', sym:'€' },
  { c:'SGD', label:'🇸🇬 싱가포르달러 (SGD)', sym:'S$' }
];
const CUR_SYM = Object.fromEntries(CURRENCIES.map(x => [x.c, x.sym]));
const DEFAULT_RATES = { JPY:9, USD:1350, CNY:190, HKD:173, EUR:1450, SGD:1010 };  // 대략값(수정 가능·자동조회로 갱신)
const rateCache = {};
const catEmoji = (cats, key) => { const f = cats.find(c => c[0] === key); return f ? f[1].split(' ')[0] : '📌'; };
const catLabel = (cats, key) => { const f = cats.find(c => c[0] === key); return f ? f[1] : '📌 기타'; };

// ═══════════════ 저장/유틸 ═══════════════
function load() {
  try { db = JSON.parse(localStorage.getItem(STORE_KEY)) || { trips: [] }; }
  catch { db = { trips: [] }; }
  if (!Array.isArray(db.trips)) db.trips = [];
  for (const t of db.trips) normalizeTrip(t);
}
function normalizeTrip(t) {
  if (!t.dues || typeof t.dues !== 'object') t.dues = {};
  if (!t.treasurerId || !t.members.some(m => m.id === t.treasurerId))
    t.treasurerId = t.members[0] ? t.members[0].id : null;
  if (!t.code) t.code = genCode();
  if (typeof t.cloud !== 'boolean') t.cloud = false;
  if (typeof t.theme !== 'string') t.theme = '';
  return t;
}
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(db)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = ''; const arr = new Uint8Array(6);
  window.crypto.getRandomValues(arr);
  for (const b of arr) s += chars[b % chars.length];
  return s;
}
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c]);
}
function fmt(n) { return Math.round(n || 0).toLocaleString('ko-KR'); }
function getTrip(id) { return db.trips.find(t => t.id === id); }
function cur() { return getTrip(currentTripId); }

function parseD(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function dstr(dt) {
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function fmtDate(s) { const dt = parseD(s); return `${dt.getMonth()+1}/${dt.getDate()}(${'일월화수목금토'[dt.getDay()]})`; }
function fmtRange(t) {
  const a = parseD(t.startDate), b = parseD(t.endDate);
  return `${a.getFullYear()}.${a.getMonth()+1}.${a.getDate()} ~ ${b.getMonth()+1}.${b.getDate()}`;
}
function tripDays(t) {
  const days = []; let d = parseD(t.startDate); const end = parseD(t.endDate); let guard = 0;
  while (d <= end && guard++ < 60) { days.push(dstr(d)); d = new Date(d.getFullYear(), d.getMonth(), d.getDate()+1); }
  return days;
}
function memberName(t, id) {
  if (id === FUND) return '공금';
  const m = t.members.find(m => m.id === id);
  return m ? m.name : '?';
}
function mapUrl(place, ctx) {
  const q = place + (ctx ? ', ' + ctx : '');   // 여행지를 함께 붙여 검색 정확도↑ (동명이지 오인 방지)
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(q);
}
const URL_RE = /((?:https?:\/\/|www\.)[^\s<]+|(?:[a-z0-9](?:[a-z0-9-]*[a-z0-9])?\.)+(?:com|net|org|co|kr|io|me|jp|us|uk|edu|gov|info|biz|shop|store|app|dev|xyz|page|link|site|blog|tv|cc|ai)(?:\/[^\s<]*)?)/gi;
function findUrls(text) {
  const out = []; let m; URL_RE.lastIndex = 0;
  while ((m = URL_RE.exec(text || ''))) {
    let u = m[0].replace(/[.,!?)\]}'"]+$/, '');
    out.push({ display: u.replace(/^https?:\/\//i, ''), href: /^https?:\/\//i.test(u) ? u : 'https://' + u });
  }
  return out;
}
function linkify(text) {
  // 메모 텍스트를 안전하게 이스케이프한 뒤, URL을 클릭 가능한 링크로 변환.
  return esc(text).replace(URL_RE, m => {
    let url = m, tail = '';
    const t = url.match(/[.,!?)\]}'"]+$/);
    if (t) { tail = url.slice(url.length - t[0].length); url = url.slice(0, url.length - t[0].length); }
    const href = /^https?:\/\//i.test(url) ? url : 'https://' + url;
    return `<a class="memo-link" href="${href}" target="_blank" rel="noopener">${url}</a>${tail}`;
  });
}
function fmtTime(hhmm) {
  if (!hhmm) return '종일';
  const [h, m] = hhmm.split(':').map(Number);
  const ampm = h < 12 ? '오전' : '오후';
  const h12 = h % 12 === 0 ? 12 : h % 12;
  return `${ampm} ${h12}:${String(m).padStart(2,'0')}`;
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2400);
}

// ═══════════════ 클라우드 동기화 (Firebase) ═══════════════
function initCloud() {
  const cfg = window.FIREBASE_CONFIG;
  if (!cfg || !cfg.apiKey || !window.firebase) return false;
  try {
    firebase.initializeApp(cfg);
    fdb = firebase.firestore();
    return true;
  } catch (e) { console.warn('cloud init failed', e); return false; }
}
function cloudCopy(t) { const c = JSON.parse(JSON.stringify(t)); delete c.cloud; return c; }
function stripMeta(t) { const c = { ...t }; delete c._updatedAt; delete c.cloud; return c; }
function syncPush(trip) {
  if (!cloudOn || !trip || !trip.cloud || applyingRemote) return;
  try {
    trip._updatedAt = Date.now();
    fdb.collection('trips').doc(trip.code).set(cloudCopy(trip));
  } catch (e) { console.warn('push failed', e); }
}
function syncDelete(code) {
  if (!cloudOn || !code) return;
  if (subs[code]) { subs[code](); delete subs[code]; }
  try { fdb.collection('trips').doc(code).delete(); } catch (e) {}
}
function subscribeTrip(code) {
  if (!cloudOn || !code || subs[code]) return;
  subs[code] = fdb.collection('trips').doc(code).onSnapshot(snap => {
    if (snap.metadata.hasPendingWrites) return;   // 내가 방금 쓴 것의 반향은 무시
    if (!snap.exists) return;
    applyRemoteTrip(snap.data());
  }, err => console.warn('snapshot err', err));
}
function applyRemoteTrip(data) {
  if (!data || !data.id || !data.code) return;
  const incoming = normalizeTrip({ ...data, cloud: true });
  const idx = db.trips.findIndex(x => x.code === data.code);
  if (idx >= 0) {
    if (JSON.stringify(stripMeta(db.trips[idx])) === JSON.stringify(stripMeta(incoming))) return;
    db.trips[idx] = incoming;
  } else db.trips.push(incoming);
  applyingRemote = true; save(); applyingRemote = false;
  render();
}
function startSync() {
  if (!cloudOn) return;
  for (const t of db.trips) if (t.cloud) subscribeTrip(t.code);
}
function joinStatus(msg, color) {
  const el = $('joinStatus');
  if (el) { el.textContent = msg; el.style.color = color || 'var(--muted)'; }
}
function openJoinSheet() {
  $('joinCode').value = '';
  joinStatus('가족이 알려준 6자리 코드를 입력하세요.');
  openSheet('sheetJoin');
  setTimeout(() => $('joinCode').focus(), 100);
}
async function joinByCode(code) {
  if (!cloudOn) { joinStatus('실시간 공유가 설정되지 않았어요.', 'var(--red)'); return; }
  code = (code || '').trim().toUpperCase();
  if (!code) { joinStatus('코드를 입력해 주세요.', 'var(--red)'); return; }
  joinStatus('여행을 찾는 중...', 'var(--accent)');
  try {
    const snap = await fdb.collection('trips').doc(code).get();
    if (!snap.exists) {
      joinStatus('그 코드의 여행을 찾을 수 없어요. 코드를 다시 확인하거나, 만든 기기에서 "실시간 공유"가 켜져 있는지(☁️ 표시) 확인하세요.', 'var(--red)');
      return;
    }
    const data = normalizeTrip({ ...snap.data(), cloud: true });
    const idx = db.trips.findIndex(x => x.code === code);
    if (idx >= 0) db.trips[idx] = data; else db.trips.push(data);
    applyingRemote = true; save(); applyingRemote = false;
    subscribeTrip(code);
    currentTripId = data.id; view = 'trip'; currentTab = 'schedule'; dayFilter = 'all';
    _hideSheets(); render();   // 참여 시트→여행상세 전환, 히스토리 항목 유지
    toast(`"${data.name}" 여행에 참여했어요!`);
  } catch (e) {
    const code = (e && e.code) || '';
    const msg = (e && e.message) || '';
    const denied = code === 'permission-denied' || /permission|insufficient/i.test(msg);
    const noDb = code === 'unavailable' || code === 'not-found' || code === 'failed-precondition'
      || /database|firestore.*(not|없|does not exist)/i.test(msg);
    let text;
    if (denied) text = '⚠️ Firestore 보안 규칙에서 막혀 있어요. 규칙을 열어야 참여할 수 있어요.';
    else if (noDb) text = '⚠️ Firestore 데이터베이스가 아직 없거나 연결이 안 돼요. Firebase에서 "Firestore Database 만들기"를 했는지 확인하세요.';
    else text = '오류가 발생했어요. 인터넷 연결을 확인하고 다시 시도해 주세요.';
    joinStatus(`${text}  [${code || 'unknown'}]`, 'var(--red)');
  }
}
// URL에 여행 코드가 있으면(?trip=CODE 또는 #CODE) 자동으로 그 여행을 열기
async function autoOpenFromUrl() {
  let code = '';
  try { code = new URLSearchParams(location.search).get('trip') || ''; } catch (e) {}
  if (!code && location.hash) code = location.hash.replace(/^#/, '');
  code = (code || '').trim().toUpperCase();
  if (!code) return;
  let trip = db.trips.find(t => t.code === code);
  if (!trip && cloudOn) {
    try {
      const snap = await fdb.collection('trips').doc(code).get();
      if (snap.exists) {
        trip = normalizeTrip({ ...snap.data(), cloud: true });
        db.trips.push(trip);
        applyingRemote = true; save(); applyingRemote = false;
        subscribeTrip(code);
      }
    } catch (e) {}
  }
  if (trip) {
    currentTripId = trip.id; view = 'trip'; currentTab = 'schedule'; dayFilter = 'all';
    render(); pushLayer();
    toast(`"${trip.name}" 여행을 열었어요`);
  } else if (cloudOn) {
    toast('링크의 여행을 찾을 수 없어요');
  }
}
function enableCloud(t) {
  if (!cloudOn) { toast('실시간 공유가 아직 설정되지 않았어요'); return; }
  t.cloud = true;
  if (!t.code) t.code = genCode();
  save(); syncPush(t); subscribeTrip(t.code); render();
  toast('실시간 공유를 켰어요! 가족에게 코드를 알려주세요');
}

// ═══════════════ 사진: IndexedDB(로컬) ═══════════════
let _idb = null;
function idbOpen() {
  if (_idb) return Promise.resolve(_idb);
  return new Promise((res, rej) => {
    const req = indexedDB.open('ftp-media', 1);
    req.onupgradeneeded = () => {
      const store = req.result.createObjectStore('photos', { keyPath: 'id' });
      store.createIndex('byTrip', 'tripCode', { unique: false });
    };
    req.onsuccess = () => { _idb = req.result; res(_idb); };
    req.onerror = () => rej(req.error);
  });
}
async function idbPut(photo) {
  const d = await idbOpen();
  return new Promise((res, rej) => {
    const tx = d.transaction('photos', 'readwrite');
    tx.objectStore('photos').put(photo);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}
async function idbDelete(id) {
  const d = await idbOpen();
  return new Promise((res, rej) => {
    const tx = d.transaction('photos', 'readwrite');
    tx.objectStore('photos').delete(id);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}
async function idbGetByTrip(tripCode) {
  const d = await idbOpen();
  return new Promise((res, rej) => {
    const out = [];
    const idx = d.transaction('photos', 'readonly').objectStore('photos').index('byTrip');
    idx.openCursor(IDBKeyRange.only(tripCode)).onsuccess = e => {
      const cur = e.target.result;
      if (cur) { out.push(cur.value); cur.continue(); } else res(out);
    };
  });
}

// ═══════════════ 사진: 압축 ═══════════════
function fileToDataURL(file) {
  return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file); });
}
function loadImage(src) {
  return new Promise((res, rej) => { const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = src; });
}
async function compressImage(file) {
  const url = await fileToDataURL(file);
  const img = await loadImage(url);
  let w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
  const scale = Math.min(1, PHOTO_MAX_DIM / Math.max(w, h));
  w = Math.max(1, Math.round(w * scale)); h = Math.max(1, Math.round(h * scale));
  const canvas = document.createElement('canvas');
  const draw = () => { canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h); };
  draw();
  let q = 0.72, out = canvas.toDataURL('image/jpeg', q), guard = 0;
  while (out.length * 0.75 > PHOTO_TARGET_BYTES && guard++ < 8) {
    if (q > 0.34) q -= 0.12;
    else { w = Math.round(w * 0.85); h = Math.round(h * 0.85); draw(); q = 0.6; }
    out = canvas.toDataURL('image/jpeg', q);
  }
  return out;
}

// ═══════════════ 사진: 클라우드 동기화 ═══════════════
function photoCloudCopy(p) { return { id: p.id, schedId: p.schedId, data: p.data, createdAt: p.createdAt || 0 }; }
function subscribePhotos(code) {
  if (!cloudOn || !code || photoSubs[code]) return;
  photoSubs[code] = fdb.collection('trips').doc(code).collection('photos').onSnapshot(snap => {
    let changed = false;
    snap.docChanges().forEach(ch => {
      if (ch.doc.metadata.hasPendingWrites) return;  // 내 쓰기 반향 무시
      const d = ch.doc.data();
      if (ch.type === 'removed') {
        idbDelete(d.id); if (loadedPhotoCode === code) tripPhotos = tripPhotos.filter(p => p.id !== d.id); changed = true;
      } else {
        const photo = { id: d.id, tripCode: code, schedId: d.schedId, data: d.data, createdAt: d.createdAt || 0 };
        idbPut(photo);
        if (loadedPhotoCode === code) {
          const i = tripPhotos.findIndex(p => p.id === d.id);
          if (i >= 0) tripPhotos[i] = photo; else tripPhotos.push(photo);
        }
        changed = true;
      }
    });
    if (changed && view === 'trip' && (currentTab === 'schedule' || currentTab === 'expense' || currentTab === 'member')) render();
  }, err => console.warn('photo snapshot err', err));
}
function pushPhotoCloud(trip, photo) {
  if (!cloudOn || !trip || !trip.cloud) return;
  try { fdb.collection('trips').doc(trip.code).collection('photos').doc(photo.id).set(photoCloudCopy(photo)); }
  catch (e) { console.warn('photo push failed', e); }
}
function deletePhotoCloud(code, id) {
  if (!cloudOn || !code) return;
  try { fdb.collection('trips').doc(code).collection('photos').doc(id).delete(); } catch (e) {}
}

// ═══════════════ 사진: 로드/추가/삭제 ═══════════════
async function loadTripMedia(t) {
  if (!t) return;
  if (loadedPhotoCode === t.code) { if (t.cloud) subscribePhotos(t.code); return; }
  loadedPhotoCode = t.code;
  try { tripPhotos = await idbGetByTrip(t.code); } catch { tripPhotos = []; }
  if (t.cloud) subscribePhotos(t.code);
  if (view === 'trip' && (currentTab === 'schedule' || currentTab === 'expense' || currentTab === 'member')) render();
}
function photosFor(schedId) {
  return tripPhotos.filter(p => p.schedId === schedId).sort((a,b) => (a.createdAt||0) - (b.createdAt||0));
}
async function addPhotos(schedId, files) {
  const t = cur(); if (!t) return;
  const imgs = Array.from(files).filter(f => f.type.startsWith('image/'));
  if (!imgs.length) { toast('이미지 파일만 첨부할 수 있어요'); return; }
  toast(imgs.length > 1 ? `사진 ${imgs.length}장 추가 중...` : '사진 추가 중...');
  let ok = 0;
  for (const f of imgs) {
    try {
      const data = await compressImage(f);
      const photo = { id: uid(), tripCode: t.code, schedId, data, createdAt: Date.now() + ok };
      await idbPut(photo);
      tripPhotos.push(photo);
      pushPhotoCloud(t, photo);
      ok++;
      render();
    } catch (e) { console.warn('photo add failed', e); }
  }
  if (ok) toast(`사진 ${ok}장을 추가했어요`);
  else toast('사진을 불러오지 못했어요 (형식 확인)');
}
async function deletePhoto(id) {
  const t = cur();
  const p = tripPhotos.find(x => x.id === id);
  await idbDelete(id);
  tripPhotos = tripPhotos.filter(x => x.id !== id);
  if (p && t) deletePhotoCloud(t.code, id);
  render();
}
async function deletePhotosForSched(schedId) {
  const t = cur();
  const list = tripPhotos.filter(p => p.schedId === schedId);
  for (const p of list) { await idbDelete(p.id); if (t) deletePhotoCloud(t.code, p.id); }
  tripPhotos = tripPhotos.filter(p => p.schedId !== schedId);
}
async function deleteAllTripMedia(t) {
  const list = await idbGetByTrip(t.code).catch(() => []);
  for (const p of list) { await idbDelete(p.id); if (t.cloud) deletePhotoCloud(t.code, p.id); }
  if (loadedPhotoCode === t.code) tripPhotos = [];
}

// ═══════════════ DOM 참조 ═══════════════
const $ = id => document.getElementById(id);
const headerEl = $('header'), mainEl = $('main'), fab = $('fab'), overlay = $('overlay');

// ═══════════════ 뒤로가기(하드웨어 버튼) 제어 ═══════════════
// 열려있는 레이어(사진뷰 > 시트 > 여행상세)를 한 단계씩 닫고,
// 홈 화면에서 뒤로가기를 누를 때만 앱이 종료되도록 히스토리를 사용.
let suppressPop = false;
function topLayer() {
  if ($('game').classList.contains('show')) return 'game';
  if ($('lightbox').classList.contains('show')) return 'lightbox';
  if (document.querySelector('.sheet.show')) return 'sheet';
  if (view === 'trip') return 'trip';
  return null;
}
function closeLayer(layer) {
  if (layer === 'game') _hideGame();
  else if (layer === 'lightbox') _hideLightbox();
  else if (layer === 'sheet') _hideSheets();
  else if (layer === 'trip') { view = 'home'; render(); }
}
function pushLayer() { try { history.pushState({ ftp: 1 }, ''); } catch (e) {} }
function consumeEntry() { suppressPop = true; try { history.back(); } catch (e) { suppressPop = false; } }
function uiBack() {                       // 화면 안 버튼(×, ‹ 등)으로 닫을 때
  const layer = topLayer();
  if (!layer) return;
  closeLayer(layer);
  consumeEntry();
}
window.addEventListener('popstate', () => { // 하드웨어/브라우저 뒤로가기
  if (suppressPop) { suppressPop = false; return; }
  const layer = topLayer();
  if (layer) closeLayer(layer);   // 열린 레이어가 있으면 닫기 (앱 유지)
  // 홈이면 아무것도 안 함 → 브라우저 기본 동작(앱 종료)
});

// ═══════════════ 시트 열기/닫기 ═══════════════
function _hideSheets() {
  overlay.classList.remove('show');
  document.querySelectorAll('.sheet').forEach(s => s.classList.remove('show'));
}
function openSheet(id) {
  overlay.classList.add('show');
  document.querySelectorAll('.sheet').forEach(s => s.classList.remove('show'));
  $(id).classList.add('show');
  pushLayer();
}
function closeSheets() { uiBack(); }
overlay.addEventListener('click', closeSheets);
document.querySelectorAll('[data-close]').forEach(b => b.addEventListener('click', closeSheets));

// ═══════════════ 렌더: 홈 ═══════════════
function render() { if (view === 'home') renderHome(); else renderTrip(); }

function renderHome() {
  fab.classList.remove('show');
  headerEl.innerHTML = `
    <div class="header-badge">Family Trip · PWA</div>
    <div class="header-title">🧳 우리 &amp; 여행 <span class="credit" id="credit">made by JHY with Claude</span></div>
    <div class="header-sub">일정도 같이 보고, 쓴 돈도 같이 정산해요${cloudOn ? ' · ☁️ 실시간 공유' : ''}</div>`;
  const cr = $('credit'); if (cr) cr.addEventListener('click', creditTap);

  const today = dstr(new Date());
  let html = '';
  // 새 여행 만들기(호스트만) — 참여는 공유 링크로 자동
  if (ownerMode) html += `<button class="add-btn" id="newTripBtn">＋ 새 여행 만들기</button>`;
  html += `<button class="add-btn ghost" id="gameBtn" style="margin-top:${ownerMode ? '10px' : '4px'}">🎮 심심풀이 게임 · 벽돌깨기</button>`;

  if (!db.trips.length) {
    html += ownerMode
      ? `<div class="empty"><div class="big">✈️</div>아직 여행이 없어요.<br/>위에서 첫 여행을 만들어 보세요!</div>`
      : `<div class="empty"><div class="big">✈️</div>참여한 여행이 없어요.<br/>가족이 보내준 <b>참여 링크</b>를 누르면 자동으로 들어와요.</div>`;
  } else {

let routeItems = [];
let routeSel = new Set();
function openRouteSheet(date) {

    .sort((a,b) => (a.time || '99:99') > (b.time || '99:99') ? 1 : -1);

  openSheet('sheetRoute');
}
function renderRouteList() {

$('routeGo').addEventListener('click', () => {

// ── 일정 공유 ──
function scheduleText(t) {
  const days = tripDays(t);
  const L = [];
  L.push(`🧳 ${t.name} 일정`);
  if (t.place) L.push(`📍 ${t.place}`);
  L.push(`기간: ${fmtRange(t)}`);
  if (t.members.length) L.push(`멤버: ${t.members.map(m => m.name).join(', ')}`);
  if (t.theme) L.push(`주제: ${t.theme}`);
  L.push('');
  days.forEach((d, i) => {
    const items = t.schedule.filter(s => s.date === d).sort((a, b) => (a.time || '99:99') > (b.time || '99:99') ? 1 : -1);
    if (!items.length) return;
    L.push(`📅 DAY ${i + 1} · ${fmtDate(d)}`);
    for (const s of items) {
      L.push(`· ${fmtTime(s.time)}  ${s.title}`);
      if (s.memo) L.push(`   ${s.memo}`);
    }
    L.push('');
  });
  return L.join('\n').trim();
}
async function shareSchedule(t) {
  const text = scheduleText(t);
  if (navigator.share) { try { await navigator.share({ title: `${t.name} 일정`, text }); return; } catch {} }
  try { await navigator.clipboard.writeText(text); toast('일정을 복사했어요! 카톡에 붙여넣으세요'); }
  catch { prompt('아래 내용을 복사하세요', text); }
}

// ── 정산 계산 ──
function computeSettlement(t) {
  const dues = t.dues || {};
  const treasurerId = (t.treasurerId && t.members.some(m => m.id === t.treasurerId))
    ? t.treasurerId : (t.members[0] ? t.members[0].id : null);

  const paid = {}, share = {}, duesAmt = {};
  for (const m of t.members) { paid[m.id] = 0; share[m.id] = 0; duesAmt[m.id] = Number(dues[m.id]) || 0; }

  let fundIn = 0, fundOut = 0;
  for (const m of t.members) fundIn += duesAmt[m.id];

  for (const e of t.expenses) {
    if (e.payerId === FUND) fundOut += e.amount;
    else if (paid[e.payerId] != null) paid[e.payerId] += e.amount;
    const ids = e.splitIds.filter(id => share[id] != null);
    if (!ids.length) continue;
    const each = e.amount / ids.length;
    for (const id of ids) share[id] += each;
  }

  const heldFund = fundIn - fundOut;   // 총무가 실제로 들고 있는 공금 잔액
  const bal = {};
  for (const m of t.members) {
    let b = duesAmt[m.id] + paid[m.id] - share[m.id];
    if (m.id === treasurerId) b -= heldFund;   // 총무는 남은 공금을 돌려줘야 함
    bal[m.id] = { paid: paid[m.id], dues: duesAmt[m.id], share: share[m.id],
                  contributed: duesAmt[m.id] + paid[m.id], balance: b };
  }

  const creditors = [], debtors = [];
  for (const m of t.members) {
    const b = bal[m.id].balance;
    if (b > 0.5) creditors.push({ id: m.id, amt: b });
    else if (b < -0.5) debtors.push({ id: m.id, amt: -b });
  }
  creditors.sort((a,b) => b.amt - a.amt);
  debtors.sort((a,b) => b.amt - a.amt);
  const transfers = []; let ci = 0, di = 0;
  while (ci < creditors.length && di < debtors.length) {
    const pay = Math.min(creditors[ci].amt, debtors[di].amt);
    if (pay > 0.5) transfers.push({ from: debtors[di].id, to: creditors[ci].id, amt: pay });
    creditors[ci].amt -= pay; debtors[di].amt -= pay;
    if (creditors[ci].amt < 0.5) ci++;
    if (debtors[di].amt < 0.5) di++;
  }
  return { bal, transfers, treasurerId, fundIn, fundOut, heldFund };
}

// ── 정산 탭 ──
function renderSettleTab(t, body) {
  const total = t.expenses.reduce((s,e) => s + e.amount, 0);
  const r = computeSettlement(t);

  let html = `<div class="summary-card">
    <div class="summary-label">정산 기준 총액</div>
    <div class="summary-total">₩ ${fmt(total)}</div>
    <div class="summary-meta">각자 낸 돈(회비+개인결제)과 부담할 몫을 비교해 자동 계산해요</div>
    ${r.fundIn > 0 ? `<div class="fund-strip">
      <div class="fund-pill"><div class="k">걷은 회비</div><div class="v">${fmt(r.fundIn)}</div></div>
      <div class="fund-pill"><div class="k">공금 사용</div><div class="v">${fmt(r.fundOut)}</div></div>
      <div class="fund-pill"><div class="k">남은 공금</div><div class="v ${r.heldFund<0?'warn':'ok'}">${fmt(r.heldFund)}</div></div>
    </div>` : ''}
  </div>`;

  // 회비 입력 영역
  html += `<div class="divider"><span class="divider-label">💰 회비 (미리 걷은 돈)</span><div class="divider-line"></div></div>`;
  html += `<div style="font-size:12px;color:var(--muted);margin:0 2px 10px">총무를 정하고, 각자 낸 회비를 입력하세요. 공금으로 쓴 경비는 경비 추가 때 <b>🏦 공금</b>으로 표시하면 돼요.</div>`;
  html += `<div style="font-size:12px;color:var(--muted);margin:0 2px 6px">총무 (공금 보관자)</div>`;
  html += `<div class="chip-row" id="treasurerChips" style="margin-bottom:14px">${t.members.map(m =>
    `<span class="chip ${r.treasurerId===m.id?'on':''}" data-treasurer="${m.id}">${esc(m.name)}</span>`).join('')}</div>`;
  html += t.members.map(m => `
    <div class="dues-row">
      <span class="dues-name">${esc(m.name)}</span>
      <input class="dues-input" type="text" inputmode="numeric" data-dues="${m.id}"
             value="${(Number(t.dues[m.id])||0) ? fmt(t.dues[m.id]) : ''}" placeholder="0"/>
    </div>`).join('');
  html += `<div class="treasurer-note">💡 회비를 안 걷었으면 비워두세요. 그러면 각자 결제한 경비로만 정산됩니다.</div>`;

  // 결과
  if (!t.expenses.length && r.fundIn === 0) {
    html += `<div class="empty"><div class="big">🧮</div>회비나 경비를 입력하면<br/>누가 누구에게 보낼지 자동으로 계산해 드려요</div>`;
  } else {
    html += `<div class="divider"><span class="divider-label">💸 이렇게 보내면 끝</span><div class="divider-line"></div></div>`;
    if (!r.transfers.length) {
      html += `<div class="empty" style="padding:16px">이미 딱 맞아요! 보낼 돈이 없습니다 🎉</div>`;
    } else {
      html += r.transfers.map(tr => `
        <div class="transfer-item">
          <span><b>${esc(memberName(t, tr.from))}</b><span class="transfer-arrow">→</span><b>${esc(memberName(t, tr.to))}</b></span>
          <span class="transfer-amt">${fmt(tr.amt)}원</span>
        </div>`).join('');
    }

    html += `<div class="divider"><span class="divider-label">👤 멤버별 내역</span><div class="divider-line"></div></div>`;
    for (const m of t.members) {
      const b = r.bal[m.id];
      const diff = b.balance;
      const cls = diff > 0.5 ? 'plus' : diff < -0.5 ? 'minus' : '';
      const sign = diff > 0.5 ? '+' : '';
      const isT = m.id === r.treasurerId;
      html += `<div class="settle-member">
        <div>
          <div class="settle-name">${esc(m.name)}${isT ? '<span class="settle-tag">총무</span>' : ''}</div>

    c.addEventListener('click', () => {

  body.querySelectorAll('[data-dues]').forEach(inp => {
    inp.addEventListener('input', e => {
      const raw = e.target.value.replace(/[^\d]/g, '').slice(0, 12);
      e.target.value = raw ? Number(raw).toLocaleString('ko-KR') : '';
    });
    inp.addEventListener('change', e => {
      const val = Number(e.target.value.replace(/[^\d]/g, '')) || 0;
      t.dues[inp.dataset.dues] = val;
      save(); syncPush(t); render();
    });
  });
  const sb = $('shareSettle');
  if (sb) sb.addEventListener('click', () => shareSettlement(t));
}

function settlementText(t) {
  const total = t.expenses.reduce((s,e) => s + e.amount, 0);
  const r = computeSettlement(t);
  const lines = [];
  lines.push(`🧳 ${t.name} 정산`);
  lines.push(`기간: ${fmtRange(t)}`);
  lines.push(`총 지출: ${fmt(total)}원 (${t.members.length}명)`);
  if (r.fundIn > 0) lines.push(`회비 ${fmt(r.fundIn)}원 · 공금사용 ${fmt(r.fundOut)}원 · 남은공금 ${fmt(r.heldFund)}원`);
  lines.push('');
  if (r.transfers.length) {
    lines.push('💸 이렇게 보내면 정산 끝!');
    for (const tr of r.transfers)
      lines.push(`· ${memberName(t, tr.from)} → ${memberName(t, tr.to)} : ${fmt(tr.amt)}원`);
  } else lines.push('💸 보낼 돈 없음 — 이미 딱 맞아요!');
  lines.push('');
  lines.push('👤 멤버별 내역');
  for (const m of t.members) {
    const b = r.bal[m.id];
    const isT = m.id === r.treasurerId ? '(총무)' : '';
    lines.push(`· ${m.name}${isT}: 회비${fmt(b.dues)}+결제${fmt(b.paid)} / 부담${fmt(b.share)} → ${b.balance >= 0 ? '+' : ''}${fmt(b.balance)}`);
  }
  if (t.cloud) { lines.push(''); lines.push(`🔗 실시간 공유 코드: ${t.code}`); }
  return lines.join('\n');
}
async function shareSettlement(t) {
  const text = settlementText(t);
  if (navigator.share) { try { await navigator.share({ title: `${t.name} 정산`, text }); return; } catch {} }
  try { await navigator.clipboard.writeText(text); toast('정산 내용을 복사했어요! 카톡에 붙여넣으세요'); }
  catch { prompt('아래 내용을 복사하세요', text); }
}

// ═══════════════ 내보내기/가져오기 ═══════════════
function exportTrip(t) {
  const payload = { app: 'family-trip-planner', version: 2, trip: t };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `여행_${t.name.replace(/[\\/:*?"<>|\s]+/g, '_')}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  toast('파일로 저장했어요. 가족에게 보내주세요!');
}
$('importFile').addEventListener('change', async e => {
  const file = e.target.files[0]; e.target.value = '';
  if (!file) return;
  try {
    const data = JSON.parse(await file.text());
    const t = data.trip;
    if (data.app !== 'family-trip-planner' || !t || !t.id || !t.name || !Array.isArray(t.members)) throw new Error('bad');
    t.schedule = Array.isArray(t.schedule) ? t.schedule : [];
    t.expenses = Array.isArray(t.expenses) ? t.expenses : [];
    normalizeTrip(t);
    const existing = getTrip(t.id);
    if (existing) {
      if (!confirm(`"${t.name}" 여행이 이미 있어요.\n가져온 내용으로 덮어쓸까요?`)) return;
      db.trips = db.trips.map(x => x.id === t.id ? t : x);
    } else db.trips.push(t);
    save(); if (t.cloud) { syncPush(t); subscribeTrip(t.code); }
    currentTripId = t.id; view = 'trip'; currentTab = 'schedule'; dayFilter = 'all';
    render(); toast(`"${t.name}" 여행을 가져왔어요!`);
  } catch { toast('가져올 수 없는 파일이에요'); }
});

$('tSave').addEventListener('click', () => {
  const name = $('tName').value.trim();
  const place = $('tPlace').value.trim();
  let start = $('tStart').value, end = $('tEnd').value;
  if (!name) { toast('여행 이름을 입력해 주세요'); return; }
  if (!start || !end) { toast('여행 날짜를 선택해 주세요'); return; }
  if (end < start) [start, end] = [end, start];
  if (tripDays({ startDate: start, endDate: end }).length > 60) { toast('여행 기간은 60일까지만 가능해요'); return; }
  if (!formMembers.length) { toast('가족 멤버를 1명 이상 추가해 주세요'); return; }

  if (editTripId) {
    const t = getTrip(editTripId);
    const outSch = t.schedule.filter(s => s.date < start || s.date > end).length;
    const outExp = t.expenses.filter(e => e.date < start || e.date > end).length;
    if ((outSch || outExp) && !confirm(`바뀐 기간 밖의 일정 ${outSch}개, 경비 ${outExp}건은 목록 밖에 남아있게 돼요. 계속할까요?`)) return;
    Object.assign(t, { name, place, startDate: start, endDate: end, members: formMembers });
    if (!t.treasurerId || !formMembers.some(m => m.id === t.treasurerId)) t.treasurerId = formMembers[0].id;
    save(); syncPush(t);
    closeSheets();            // 여행 상세로 복귀 (히스토리 한 단계 소비)
  } else {
    const t = normalizeTrip({
      id: uid(), name, place, startDate: start, endDate: end,
      members: formMembers, schedule: [], expenses: [], dues: {},
      treasurerId: formMembers[0].id, code: genCode(), cloud: cloudOn
    });
    db.trips.push(t);
    save(); if (t.cloud) { syncPush(t); subscribeTrip(t.code); }
    currentTripId = t.id; view = 'trip'; currentTab = 'schedule'; dayFilter = 'all';
    _hideSheets();           // 시트→여행상세로 전환하되 히스토리 항목은 그대로 유지
  }
  render();
});

let schCat = 'tour';
function fillTimeSelects() {
  $('sAmpm').innerHTML = `<option value="">시간 없음(종일)</option><option value="AM">오전</option><option value="PM">오후</option>`;
  let hrs = ''; for (let i = 1; i <= 12; i++) hrs += `<option value="${i}">${i}시</option>`;
  $('sHour').innerHTML = hrs;
  let mins = ''; for (let i = 0; i < 60; i += 5) mins += `<option value="${i}">${String(i).padStart(2,'0')}분</option>`;
  $('sMin').innerHTML = mins;
}
function setTimeSelects(hhmm) {
  if (!hhmm) { $('sAmpm').value = ''; $('sHour').value = '9'; $('sMin').value = '0'; return; }
  const [h, m] = hhmm.split(':').map(Number);
  $('sAmpm').value = h < 12 ? 'AM' : 'PM';
  $('sHour').value = String(h % 12 === 0 ? 12 : h % 12);
  $('sMin').value = String(Math.min(55, Math.round(m / 5) * 5));
}
function readTimeSelects() {
  const ap = $('sAmpm').value;
  if (!ap) return '';
  let h = Number($('sHour').value);
  const m = Number($('sMin').value);
  if (ap === 'AM') h = (h === 12 ? 0 : h);
  else h = (h === 12 ? 12 : h + 12);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

  o.connect(g); g.connect(ac.destination);

}

// ── 벽돌깨기 ──
const BO_COLORS = ['#e07a8a', '#f4a94a', '#6fc98a', '#4cc3e8', '#9a7ae0'];
const BO_GAP = 6, BO_BRICK_H = 18;
const BO_STAGES = [
  ['#######','#######','#######','#######','#######'],
  ['#.#.#.#','.#.#.#.','#.#.#.#','.#.#.#.','#.#.#.#'],
  ['...#...','..###..','.#####.','#######','#######'],
  ['#######','#.....#','#.###.#','#.....#','#######'],
  ['#.....#','.#...#.','..#.#..','...#...','..#.#..']
];
const BO_CTRL_H = 96;
let boPaddle, boBall, boBricks = [], boLives = 3, boStage = 1, boSpeedMul = 1;
let boTop = 0, boBottom = 0, boMoveDir = 0, boParticles = [];
function spawnParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const a = Math.random() * Math.PI * 2, sp = 1.2 + Math.random() * 3.6;
    boParticles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1.2, life: 1, color: Math.random() < 0.3 ? '#ffffff' : color });
  }
}
function startBreakout() {
  hideGameMsg(); gameMode = 'breakout';
  fitGameCanvas();
  const availH = gH - BO_CTRL_H;
  const fieldH = Math.min(availH, 540);
  boTop = (availH - fieldH) / 2; boBottom = boTop + fieldH;
  setControls('breakout'); boParticles = []; boMoveDir = 0;
  gScore = 0; boLives = 3; boStage = boStageSel; boSpeedMul = BO_SPEEDS[boSpeedIdx][1];
  loadBoStage(boStage); updateBoHud();
  gRunning = true; startGameLoop();
}
function loadBoStage(stage) {
  const pat = BO_STAGES[(stage - 1) % BO_STAGES.length];
  const cols = pat[0].length, mx = 10;
  const bw = (gW - mx * 2 - BO_GAP * (cols - 1)) / cols;
  boBricks = [];
  for (let r = 0; r < pat.length; r++)
    for (let c = 0; c < cols; c++)
      if (pat[r][c] === '#')
        boBricks.push({ x: mx + c * (bw + BO_GAP), y: boTop + 14 + r * (BO_BRICK_H + BO_GAP), w: bw, h: BO_BRICK_H, alive: true, color: BO_COLORS[r % BO_COLORS.length] });
  boResetBall();
}
function boResetBall() {
  boPaddle = { w: Math.max(64, gW * 0.22), h: 12, x: gW / 2, y: boBottom - 24 };
  const sp = Math.max(4.2, gW / 88) * boSpeedMul * (1 + (boStage - 1) * 0.05);
  boBall = { x: gW / 2, y: boBottom - 40, r: 7, vx: 0, vy: 0, speed: sp, launched: false };
